<!DOCTYPE html>
<html>

  <head>
    <link rel="stylesheet" href="style.css" />
    <title>RGB Colors</title>
    <link href='https://fonts.googleapis.com/css?family=New Tegomin' rel='stylesheet'>
  </head>

  <body>
    <h1>RGB Colors</h1>
    <p><span class="rgb-code">An RGB color is specified by rgb(red, green, blue)</span></p>
    <p>
      The parameters red, green and blue define the intensity of the color:<br />0
      <em>(lowest)</em> to 255 <em>(highest)</em>
    </p>
    <hr />

    <h3>Try it out for yourself...</h3>
    <p>
      red: <input id="redIn" type="number" value="255"> 
      green: <input id="greenIn" type="number" value="255"> 
      blue: <input id="blueIn" type="number" value="0">
    </p>
    <p id="display"></p>

    <p><button id="ID">Preview</button></p>
    <p class="rgb-code">rgb (255, 255, 0)</p>
    <hr>

    <p id="Font2"><a href="https://en.wikipedia.org/wiki/RGB_color_model" target="_blank">Learn more</a> about RGB colors on wikipedia.</p>

  </body>
</html>
